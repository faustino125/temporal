inv_inversiones:
  duplicates:
    enabled: true
    primary_key: ["id_cliente","cuenta_corporativa", "id_producto"]
    severity: HIGH
  null_values:
    enabled: true
    columns: ["id_cliente","cuenta_corporativa","id_producto","fecha_informacion"]
    null_thresholds:
      id_cliente: 0
      cuenta_corporativa: 0
      id_producto: 0
      fecha_informacion: 0
    severity: CRITICAL
  dimensional:
    enabled: true
    dimensions:
      descripcion_producto:
      - plan_dorado_de_inversion
      - plan_futuro_programado
      - plazo_fijo
    severity: CRITICAL
