  fecha_constitucion_empresa: "Fecha en la que la empresa inició operaciones formalmente"
  fecha_ingreso: "Fecha en la que el cliente fue registrado por primera vez en el sistema del banco"
  antiguedad_cliente_dias: "cantidad de días transcurridos desde la fecha de vinculación del cliente"
  antiguedad_empresa_dias: "Cantidad de días transcurridos desde la fecha de constitución de la empresa"
  _observ_start_dt: "Fecha correspondiente al primer día del mes"
  _observ_end_dt: "Fecha correspondiente al último día del mes"
