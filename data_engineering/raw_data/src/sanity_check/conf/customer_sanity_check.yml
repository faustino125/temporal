#---------------- vw_Mksy_clientes --------------------------------
vw_Mksy_clientes:
  duplicates:
    enabled: true
    primary_key: ["CODIGO_CLIENTE"]
    severity: HIGH

  null_values:
    enabled: true
    columns:
    - CODIGO_CLIENTE
    - DW_FECHA_INFORMACION
    - DW_ES_5X1
    - DW_BANCA_FAVORITA
    - DW_CARTERIZACION
    null_thresholds:
      CODIGO_CLIENTE: 0         # 0% nulls allowed
      DW_FECHA_INFORMACION: 0   # 0% nulls allowed
      DW_ES_5X1: 75             # 75% nulls allowed
      DW_BANCA_FAVORITA: 50     # 50% nulls allowed
      DW_CARTERIZACION: 15      # 15% nulls allowed
    severity: HIGH

  consistency:
    enabled: true
    rules:
      - name: check_es_5x1
        condition: "(DW_ES_5X1 IS NULL) OR (DW_ES_5X1 = 'S')"
        severity: HIGH
      - name: check_banca_favorita
        condition: >
          (DW_BANCA_FAVORITA IS NULL) OR (
            DW_BANCA_FAVORITA IN (
              'ATENCION AL PUBLICO', 'BANCA PERSONAL', 'NO CODIFICADO',
              'MICROFINANZAS', 'CONTECNICA', 'PYMES', 'BANCA CORPORATIVA',
              'VIVIENDA', 'VEHICULOS', 'BI-PREMIUM', 'INTERNACIONAL'
            )
          )
        severity: HIGH
      - name: check_carterizacion
        condition: >
          (DW_CARTERIZACION IS NULL) OR (
            DW_CARTERIZACION IN (
              'SALDO ACREEDOR', 'MICROEMPRESA INDIVIDUAL', 'SOBREGIRADOS',
              'PERSONAS RENTA MEDIA', 'PERSONAS RENTA BAJA', 'TEEN',
              'INSTITUCIONAL PEQUEÑA', 'INSTITUCIONAL BAJO', 'MICROEMPRESA',
              'PYMES BAJO', 'CONSUMO MASIVO', 'PYMES MEDIO', 'BANCA PRIVADA',
              'EMPRESA GRANDE', 'INSTITUCIONAL MEDIO', 'CLIENTE SIN SALDO',
              'PERSONAS RENTA ALTA', 'INFANTIL', 'CLIENTES SIN SALDO',
              'UNIVERSITARIO', 'INSTITUCIONAL GRANDE', 'GUBERNAMENTAL',
              'GRUPO CORPORATIVO', 'INSTITUCIONAL', 'EMPRESA PEQUEÑA',
              'EMPRESA MEDIANA', 'SIN CLASIFICACION INDIVIDUAL'
            )
          )
        severity: HIGH

#---------------- vw_Mksy_cif_planilla --------------------------------
vw_Mksy_cif_planilla:
