      DW_APLICACION_DESCRIPCION: [
        'PLAZO FIJO', 'BI EN LINEA', 'PRESTAMOS', 'MONETARIOS',
        'AHORROS', 'CLUB BI', 'BI BANKING', 'TARJETA DEBITO',
