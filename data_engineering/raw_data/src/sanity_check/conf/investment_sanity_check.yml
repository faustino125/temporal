#---------------- vw_Mksy_fondos --------------------------------
vw_Mksy_fondos:
  duplicates:
    enabled: true
    primary_key: ["CODIGO_CLIENTE","CUENTA_CORPORATIVA"]
  severity: HIGH
  null_values:
